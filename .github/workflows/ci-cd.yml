name: CI/CD Pipeline for Open-Meteo Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r lambda_package/requirements.txt
        
    - name: Run tests
      run: |
        echo "Running tests..."
        # Add your test commands here
        echo "No tests implemented yet"
        
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      
    - name: Build Lambda package
      run: |
        cd lambda_package
        pip install -r requirements.txt --target .
        zip -r ../lambda_package.zip . -x "*.pyc" -x "__pycache__/"
        cd ..
        echo "Build completed"
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: lambda-package
        path: lambda_package.zip
        
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
      
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: lambda-package
        path: lambda_package
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        
    - name: Deploy Lambda functions
      run: |
        # Deploy ingest-temperature Lambda
        aws lambda update-function-code \
          --function-name ingest-temperature \
          --zip-file fileb://lambda_package.zip \
          --handler lambda_package.lambda_handler.lambda_handler \
          --runtime python3.10 \
          --timeout 300 \
          --memory-size 256
        
        # Deploy transform-temperature Lambda
        aws lambda update-function-code \
          --function-name transform-temperature \
          --zip-file fileb://lambda_package.zip \
          --handler lambda_package.transform_handler.transform_and_upload_to_rds \
          --runtime python3.10 \
          --timeout 300 \
          --memory-size 512
        
    - name: Deploy Step Functions
      run: |
        # Create or update Step Functions state machine
        aws stepfunctions create-state-machine \
          --name open-meteo-pipeline \
          --definition file://step_functions_definition.json \
          --role-arn ${{ secrets.STEP_FUNCTIONS_ROLE_ARN }}